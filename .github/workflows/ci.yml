name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint (eslint + prettier)
        run: npm run lint
      - name: Typecheck + build
        run: npm run build
      - name: Tests (vitest)
        run: npm test
      - name: Dry-run smoke (no OpenAI calls)
        run: npm run dry-run
